<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안심맵 — 인터랙티브 프로토타입</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  /* ───────────────────────── 디자인 토큰 (Design Tokens) ───────────────────────── */
  :root{
    /* Brand (Tweakable) */
    --brand:        #2E7D32;   /* Forest Green */
    --brand-dark:   #1B5E20;   /* Deep Forest */
    --brand-mint:   #4CAF50;   /* Mint Green */
    --brand-light:  #E8F5E9;   /* Soft Mint */

    /* Neutral palette */
    --g50:#FAFAFA; --g100:#F5F5F5; --g200:#EEEEEE; --g300:#E0E0E0;
    --g400:#BDBDBD; --g500:#9E9E9E; --g600:#757575; --g700:#616161;
    --g800:#424242; --g900:#212121;

    /* Semantic */
    --danger:#D32F2F; --danger-light:#FFEBEE; --info:#1976D2;

    /* Spacing (8px grid) */
    --sp-xs:4px; --sp-sm:8px; --sp-md:16px; --sp-lg:24px; --sp-xl:32px; --sp-2xl:48px; --sp-3xl:64px;

    /* Radius */
    --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:24px;

    /* Font scale multiplier (Tweakable) */
    --fz:1;

    --font:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    --mono:'Monaco','Consolas',monospace;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font);
    background:#E6E7E4;
    color:var(--g900);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* ───────────────────────── 타이포그래피 스케일 ───────────────────────── */
  .t-display { font-size:calc(36px*var(--fz)); font-weight:700; line-height:1.2;  letter-spacing:-.02em; }
  .t-h1      { font-size:calc(24px*var(--fz)); font-weight:700; line-height:1.33; letter-spacing:-.01em; }
  .t-h2      { font-size:calc(20px*var(--fz)); font-weight:600; line-height:1.4; }
  .t-h3      { font-size:calc(16px*var(--fz)); font-weight:600; line-height:1.5; }
  .t-body    { font-size:calc(16px*var(--fz)); font-weight:400; line-height:1.5; }
  .t-body-md { font-size:calc(16px*var(--fz)); font-weight:500; line-height:1.5; }
  .t-body-sm { font-size:calc(13px*var(--fz)); font-weight:400; line-height:1.38; letter-spacing:.01em; }
  .t-caption { font-size:calc(12px*var(--fz)); font-weight:600; line-height:1.33; letter-spacing:.02em; }
  .t-overline{ font-size:calc(11px*var(--fz)); font-weight:700; line-height:1.27; letter-spacing:.08em; text-transform:uppercase; }
  .mono      { font-family:var(--mono); }

  /* scrollbars inside frames */
  .scroll-y{ overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  .scroll-y::-webkit-scrollbar{ width:0; height:0; }
  .noscroll::-webkit-scrollbar{ display:none; }

  /* ───────────────────────── 애니메이션 ───────────────────────── */
  @keyframes sos-pulse{
    0%{ box-shadow:0 8px 24px rgba(211,47,47,.4), 0 0 0 0 rgba(211,47,47,.45); }
    70%{ box-shadow:0 8px 24px rgba(211,47,47,.4), 0 0 0 28px rgba(211,47,47,0); }
    100%{ box-shadow:0 8px 24px rgba(211,47,47,.4), 0 0 0 0 rgba(211,47,47,0); }
  }
  .animate-sos-pulse{ animation:sos-pulse 2s infinite; }

  @keyframes count-throb{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.14); } }
  .animate-throb{ animation:count-throb 1s ease-in-out infinite; }

  /* transform-only (no opacity) so a frozen animation clock never hides the screen */
  @keyframes slide-in-right{ from{ transform:translateX(22px); } to{ transform:translateX(0); } }
  .slide-in{ animation:slide-in-right .3s cubic-bezier(.4,0,.2,1) both; }
  @media (prefers-reduced-motion: reduce){ .slide-in{ animation:none; } }

  @keyframes sheet-up{ from{ transform:translateY(100%); } to{ transform:translateY(0); } }
  .sheet-up{ animation:sheet-up .32s cubic-bezier(.4,0,.2,1); }

  @keyframes dim-in{ from{ opacity:0; } to{ opacity:1; } }
  .dim-in{ animation:dim-in .2s ease; }

  @keyframes marker-drop{ 0%{ transform:translateY(-14px); } 60%{ transform:translateY(3px); } 100%{ transform:translateY(0); } }
  .marker-drop{ animation:marker-drop .5s cubic-bezier(.3,1.2,.5,1) both; }

  @keyframes ping-ring{ 0%{ transform:scale(.6); opacity:.7; } 100%{ transform:scale(2.4); opacity:0; } }
  .ping-ring{ animation:ping-ring 2s ease-out infinite; }

  @keyframes shimmer{ 0%{ background-position:-200% 0; } 100%{ background-position:200% 0; } }
  .skeleton{ background:linear-gradient(90deg,#eee 25%,#f5f5f5 37%,#eee 63%); background-size:200% 100%; animation:shimmer 1.4s infinite; }

  @keyframes flash-red{ 0%,100%{ opacity:.15; } 50%{ opacity:.35; } }
  .flash-red{ animation:flash-red 1s ease-in-out infinite; }

  /* press feedback */
  .press{ transition:transform .12s cubic-bezier(.4,0,.2,1), filter .15s, background-color .15s; }
  .press:active{ transform:scale(.96); }

  button{ font-family:inherit; cursor:pointer; border:none; background:none; }
  input,textarea,select{ font-family:inherit; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- frames -->
  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="frames/browser-window.jsx"></script>
  <script type="text/babel" src="frames/tweaks-panel.jsx"></script>

  <!-- app -->
  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/map.jsx"></script>
  <script type="text/babel" src="app/screens_auth.jsx"></script>
  <script type="text/babel" src="app/screens_parent.jsx"></script>
  <script type="text/babel" src="app/screens_family.jsx"></script>
  <script type="text/babel" src="app/screens_admin.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
