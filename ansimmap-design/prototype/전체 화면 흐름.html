<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안심맵 — 전체 화면 흐름 (프론트엔드 + 백엔드)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --brand:#2E7D32; --brand-dark:#1B5E20; --brand-mint:#4CAF50; --brand-light:#E8F5E9;
    --g50:#FAFAFA; --g100:#F5F5F5; --g200:#EEEEEE; --g300:#E0E0E0;
    --g400:#BDBDBD; --g500:#9E9E9E; --g600:#757575; --g700:#616161;
    --g800:#424242; --g900:#212121;
    --danger:#D32F2F; --danger-light:#FFEBEE; --info:#1976D2;
    --sp-xs:4px; --sp-sm:8px; --sp-md:16px; --sp-lg:24px; --sp-xl:32px; --sp-2xl:48px; --sp-3xl:64px;
    --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:24px;
    --fz:1;
    --font:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    --mono:'Monaco','Consolas',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{ font-family:var(--font); color:var(--g900); -webkit-font-smoothing:antialiased; }

  .t-display { font-size:calc(36px*var(--fz)); font-weight:700; line-height:1.2;  letter-spacing:-.02em; }
  .t-h1      { font-size:calc(24px*var(--fz)); font-weight:700; line-height:1.33; letter-spacing:-.01em; }
  .t-h2      { font-size:calc(20px*var(--fz)); font-weight:600; line-height:1.4; }
  .t-h3      { font-size:calc(16px*var(--fz)); font-weight:600; line-height:1.5; }
  .t-body    { font-size:calc(16px*var(--fz)); font-weight:400; line-height:1.5; }
  .t-body-md { font-size:calc(16px*var(--fz)); font-weight:500; line-height:1.5; }
  .t-body-sm { font-size:calc(13px*var(--fz)); font-weight:400; line-height:1.38; letter-spacing:.01em; }
  .t-caption { font-size:calc(12px*var(--fz)); font-weight:600; line-height:1.33; letter-spacing:.02em; }
  .t-overline{ font-size:calc(11px*var(--fz)); font-weight:700; line-height:1.27; letter-spacing:.08em; text-transform:uppercase; }
  .mono      { font-family:var(--mono); }

  .scroll-y{ overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  .scroll-y::-webkit-scrollbar{ width:0; height:0; }
  .noscroll::-webkit-scrollbar{ display:none; }

  @keyframes sos-pulse{ 0%{ box-shadow:0 8px 24px rgba(211,47,47,.4), 0 0 0 0 rgba(211,47,47,.45); } 70%{ box-shadow:0 8px 24px rgba(211,47,47,.4), 0 0 0 28px rgba(211,47,47,0); } 100%{ box-shadow:0 8px 24px rgba(211,47,47,.4), 0 0 0 0 rgba(211,47,47,0); } }
  .animate-sos-pulse{ animation:sos-pulse 2s infinite; }
  @keyframes count-throb{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.14); } }
  .animate-throb{ animation:count-throb 1s ease-in-out infinite; }
  @keyframes slide-in-right{ from{ transform:translateX(22px); } to{ transform:translateX(0); } }
  .slide-in{ animation:slide-in-right .3s cubic-bezier(.4,0,.2,1) both; }
  @media (prefers-reduced-motion: reduce){ .slide-in{ animation:none; } }
  @keyframes sheet-up{ from{ transform:translateY(100%); } to{ transform:translateY(0); } }
  .sheet-up{ animation:sheet-up .32s cubic-bezier(.4,0,.2,1); }
  @keyframes dim-in{ from{ opacity:0; } to{ opacity:1; } }
  .dim-in{ animation:dim-in .2s ease; }
  @keyframes marker-drop{ 0%{ transform:translateY(-14px); } 60%{ transform:translateY(3px); } 100%{ transform:translateY(0); } }
  .marker-drop{ animation:marker-drop .5s cubic-bezier(.3,1.2,.5,1) both; }
  @keyframes ping-ring{ 0%{ transform:scale(.6); opacity:.7; } 100%{ transform:scale(2.4); opacity:0; } }
  .ping-ring{ animation:ping-ring 2s ease-out infinite; }
  @keyframes shimmer{ 0%{ background-position:-200% 0; } 100%{ background-position:200% 0; } }
  .skeleton{ background:linear-gradient(90deg,#eee 25%,#f5f5f5 37%,#eee 63%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
  @keyframes flash-red{ 0%,100%{ opacity:.15; } 50%{ opacity:.35; } }
  .flash-red{ animation:flash-red 1s ease-in-out infinite; }
  .press{ transition:transform .12s cubic-bezier(.4,0,.2,1), filter .15s, background-color .15s; }
  .press:active{ transform:scale(.96); }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; }
  input,textarea,select{ font-family:inherit; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
/* ============================================================================
   안심맵 (AnsimMap) — 전체 화면 흐름 (Full Screen Flow) · 단일 파일
   디자인 캔버스에 프론트엔드(모바일) + 백엔드(관리자) 전체 화면 + 모든 상태 보드를
   동선 순서대로 펼쳐 보여줌. 각 보드는 독립적으로 동작하는 미니앱.
   통합 순서: icons → ui → map → ios/chrome frames → design-canvas
            → screens(auth/parent/family/admin, preset 지원) → overview
   ========================================================================== */
const { useState, useEffect, useRef, useContext, createContext, useCallback } = React;

/* ════════════════════ icons.jsx ════════════════════ */
const ICON_PATHS = {
  settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  back: '<path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>',
  chevronRight: '<path d="M9 18l6-6-6-6"/>',
  chevronDown: '<path d="M6 9l6 6 6-6"/>',
  close: '<path d="M18 6 6 18"/><path d="M6 6l12 12"/>',
  check: '<path d="M20 6 9 17l-5-5"/>',
  checkCircle: '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
  search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
  shieldCheck: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>',
  mapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/>',
  map: '<path d="M9 4 3 6v15l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v15"/><path d="M15 6v15"/>',
  sos: '<path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 8v5"/><path d="M12 16h.01"/>',
  phone: '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>',
  battery: '<rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/>',
  bell: '<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>',
  message: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  send: '<path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/>',
  calendar: '<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/>',
  clock: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  user: '<circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/>',
  users: '<circle cx="9" cy="8" r="3.5"/><path d="M2 21v-1a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v1"/><path d="M16 4.5a3.5 3.5 0 0 1 0 7"/><path d="M22 21v-1a5 5 0 0 0-4-4.9"/>',
  qr: '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3"/><path d="M21 14v.01"/><path d="M14 21h.01"/><path d="M17 17h.01"/><path d="M21 17v4"/>',
  copy: '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
  plus: '<path d="M12 5v14"/><path d="M5 12h14"/>',
  power: '<path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.8 0"/>',
  trash: '<path d="M3 6h18"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  alert: '<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  doc: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>',
  download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>',
  logout: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/>',
  chart: '<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>',
  route: '<circle cx="6" cy="19" r="3"/><circle cx="18" cy="5" r="3"/><path d="M9 19h5a4 4 0 0 0 0-8H9a4 4 0 0 1 0-8h1"/>',
  layers: '<path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/>',
  heart: '<path d="M19 14c1.5-1.5 3-3.4 3-5.5A4.5 4.5 0 0 0 12 5 4.5 4.5 0 0 0 2 8.5c0 2.1 1.5 4 3 5.5l7 7 7-7z"/>',
  edit: '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
};

function Icon({ name, size = 24, color = 'currentColor', stroke = 1.75, fill = 'none', style = {} }) {
  const d = ICON_PATHS[name];
  if (!d) return null;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color}
      strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
      style={{ flexShrink: 0, display: 'block', ...style }}
      dangerouslySetInnerHTML={{ __html: d }} />
  );
}

/* ════════════════════ ui.jsx ════════════════════ */
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);
const TOP_INSET = 56;
const BOTTOM_INSET = 22;

function Btn({ children, onClick, variant = 'primary', size = 'md', full = true, disabled = false, icon, style = {} }) {
  const base = {
    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
    width: full ? '100%' : 'auto',
    height: size === 'lg' ? 56 : size === 'sm' ? 40 : 48,
    padding: size === 'sm' ? '0 16px' : '0 20px',
    borderRadius: 'var(--r-sm)', fontWeight: 700,
    fontSize: size === 'lg' ? 'calc(20px*var(--fz))' : 'calc(17px*var(--fz))',
    letterSpacing: '-.01em', transition: 'all .18s cubic-bezier(.4,0,.2,1)',
  };
  const variants = {
    primary: { background: disabled ? 'var(--g300)' : 'var(--brand)', color: disabled ? 'var(--g500)' : '#fff' },
    danger:  { background: disabled ? 'var(--g300)' : 'var(--danger)', color: '#fff' },
    secondary: { background: 'var(--brand-light)', color: 'var(--brand-dark)' },
    outline: { background: '#fff', color: 'var(--g800)', border: '1.5px solid var(--g300)' },
    ghost:   { background: 'transparent', color: 'var(--brand-dark)' },
    dangerGhost: { background: '#fff', color: 'var(--danger)', border: '1.5px solid var(--danger)' },
  };
  return (
    <button className="press" onClick={disabled ? undefined : onClick} disabled={disabled}
      style={{ ...base, ...variants[variant], cursor: disabled ? 'not-allowed' : 'pointer', ...style }}>
      {icon && <Icon name={icon} size={size === 'lg' ? 24 : 20} stroke={2} />}
      {children}
    </button>
  );
}

function Field({ label, value, onChange, placeholder, type = 'text', maxLength, error, hint, mono, big, inputRef, onFocus }) {
  const [focus, setFocus] = useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      {label && <label className="t-h3" style={{ color: 'var(--g800)' }}>{label}</label>}
      <input ref={inputRef} type={type} value={value} maxLength={maxLength}
        placeholder={placeholder}
        onChange={e => onChange && onChange(e.target.value)}
        onFocus={() => { setFocus(true); onFocus && onFocus(); }} onBlur={() => setFocus(false)}
        className={mono ? 'mono' : ''}
        style={{
          height: big ? 56 : 48, padding: '0 16px', width: '100%',
          fontSize: big ? 'calc(22px*var(--fz))' : 'calc(17px*var(--fz))',
          fontWeight: mono ? 700 : 500, letterSpacing: mono ? '.18em' : 0,
          textAlign: mono ? 'center' : 'left',
          borderRadius: 'var(--r-sm)', outline: 'none', color: 'var(--g900)',
          background: error ? 'var(--danger-light)' : focus ? 'var(--brand-light)' : '#fff',
          border: `1.5px solid ${error ? 'var(--danger)' : focus ? 'var(--brand)' : 'var(--g200)'}`,
          transition: 'all .15s',
        }} />
      {error && <span className="t-body-sm" style={{ color: 'var(--danger)', fontWeight: 500 }}>{error}</span>}
      {hint && !error && <span className="t-body-sm" style={{ color: 'var(--g500)' }}>{hint}</span>}
    </div>
  );
}

function Toggle({ on, onChange, size = 'md' }) {
  const w = size === 'lg' ? 64 : 52, h = size === 'lg' ? 36 : 30, knob = h - 6;
  return (
    <button onClick={() => onChange(!on)} aria-pressed={on}
      style={{
        width: w, height: h, borderRadius: 999, padding: 3, flexShrink: 0,
        background: on ? 'var(--brand)' : 'var(--g300)', transition: 'background .22s',
        display: 'flex', alignItems: 'center', justifyContent: on ? 'flex-end' : 'flex-start',
      }}>
      <span style={{ width: knob, height: knob, borderRadius: 999, background: '#fff',
        boxShadow: '0 2px 5px rgba(0,0,0,.2)', transition: 'all .22s' }} />
    </button>
  );
}

function CheckRow({ checked, onChange, children, required }) {
  return (
    <button onClick={() => onChange(!checked)} className="press"
      style={{ display: 'flex', alignItems: 'center', gap: 12, width: '100%', textAlign: 'left', padding: '6px 0' }}>
      <span style={{
        width: 26, height: 26, borderRadius: 7, flexShrink: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: checked ? 'var(--brand)' : '#fff',
        border: `2px solid ${checked ? 'var(--brand)' : 'var(--g300)'}`, transition: 'all .15s',
      }}>
        {checked && <Icon name="check" size={18} color="#fff" stroke={3} />}
      </span>
      <span className="t-body" style={{ color: 'var(--g800)', flex: 1 }}>
        {required && <b style={{ color: 'var(--brand-dark)' }}>[필수] </b>}{children}
      </span>
    </button>
  );
}

function RadioGroup({ options, value, onChange }) {
  return (
    <div style={{ display: 'flex', gap: 10 }}>
      {options.map(o => {
        const sel = value === o.value;
        return (
          <button key={o.value} onClick={() => onChange(o.value)} className="press"
            style={{
              flex: 1, height: 64, borderRadius: 'var(--r-md)', display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', gap: 3,
              background: sel ? 'var(--brand-light)' : '#fff',
              border: `2px solid ${sel ? 'var(--brand)' : 'var(--g200)'}`, transition: 'all .15s',
            }}>
            <span style={{ fontSize: 'calc(22px*var(--fz))' }}>{o.emoji}</span>
            <span className="t-body-sm" style={{ fontWeight: 700, color: sel ? 'var(--brand-dark)' : 'var(--g600)' }}>{o.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function Card({ children, style = {}, onClick, pad = 16 }) {
  return (
    <div onClick={onClick} className={onClick ? 'press' : ''}
      style={{ background: '#fff', borderRadius: 'var(--r-lg)', padding: pad,
        boxShadow: '0 2px 8px rgba(0,0,0,.05)', ...style }}>
      {children}
    </div>
  );
}

function Banner({ tone = 'info', icon, children, action }) {
  const tones = {
    info:   { bg: 'var(--brand-light)', fg: 'var(--brand-dark)', bd: 'rgba(46,125,50,.25)' },
    warn:   { bg: '#FFF4E5', fg: '#B25E00', bd: 'rgba(178,94,0,.3)' },
    danger: { bg: 'var(--danger-light)', fg: 'var(--danger)', bd: 'rgba(211,47,47,.3)' },
    grey:   { bg: 'var(--g100)', fg: 'var(--g700)', bd: 'var(--g200)' },
  };
  const t = tones[tone];
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px',
      background: t.bg, border: `1.5px solid ${t.bd}`, borderRadius: 'var(--r-md)' }}>
      {icon && <Icon name={icon} size={20} color={t.fg} stroke={2} style={{ flexShrink: 0 }} />}
      <span className="t-body-sm" style={{ color: t.fg, fontWeight: 600, flex: 1, lineHeight: 1.4 }}>{children}</span>
      {action}
    </div>
  );
}

function Pill({ tone = 'grey', children, dot }) {
  const tones = {
    on:   { bg: 'var(--brand-light)', fg: 'var(--brand-dark)' },
    off:  { bg: 'var(--g200)', fg: 'var(--g600)' },
    danger: { bg: 'var(--danger-light)', fg: 'var(--danger)' },
    info: { bg: '#E3F2FD', fg: 'var(--info)' },
    grey: { bg: 'var(--g100)', fg: 'var(--g600)' },
  };
  const t = tones[tone];
  return (
    <span className="t-caption" style={{ display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '4px 10px', borderRadius: 999, background: t.bg, color: t.fg }}>
      {dot && <span style={{ width: 7, height: 7, borderRadius: 999, background: t.fg }} />}
      {children}
    </span>
  );
}

function Avatar({ emoji, size = 44, ring }) {
  return (
    <span style={{ width: size, height: size, borderRadius: 999, flexShrink: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'var(--brand-light)', fontSize: size * 0.52,
      border: ring ? `2.5px solid ${ring}` : 'none' }}>{emoji}</span>
  );
}

function MobileHeader({ title, brand, onBack, right, sub }) {
  return (
    <div style={{ paddingTop: TOP_INSET, paddingLeft: 8, paddingRight: 12, paddingBottom: 10,
      display: 'flex', alignItems: 'center', gap: 4, background: '#fff',
      borderBottom: '1px solid var(--g100)', flexShrink: 0, position: 'relative', zIndex: 5 }}>
      {onBack && (
        <button className="press" onClick={onBack} style={{ width: 44, height: 44, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 999 }}>
          <Icon name="back" size={24} color="var(--g800)" stroke={2.2} />
        </button>
      )}
      {brand && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, paddingLeft: onBack ? 0 : 12 }}>
          <BrandMark size={26} />
          <span className="t-h2" style={{ color: 'var(--brand-dark)', fontWeight: 800 }}>안심맵</span>
        </div>
      )}
      {title && !brand && (
        <div style={{ paddingLeft: onBack ? 0 : 12, flex: 1 }}>

function FakeMap({ markers = [], path = null, circle = null, dim = false, grey = false, showControls = true, children, style = {} }) {

  const water = grey ? '#D6D6D6' : '#A9D2EE';
  const roadMajor = grey ? '#FFFFFF' : '#FBEFC9';
  const roadMinor = '#FFFFFF';
  const casing = grey ? '#DADADA' : '#E7E2D4';
  const block = grey ? '#F4F4F4' : '#FAF8F2';
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', background: land, ...style }}>
      <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" style={{ display: 'block' }}>
        <path d="M-2 8 Q 14 2 26 10 Q 30 22 18 28 Q 4 30 -2 22 Z" fill={park} opacity="0.9" />
        <rect x="62" y="58" width="34" height="26" rx="3" fill={park} opacity="0.85" />
        <circle cx="82" cy="20" r="11" fill={park} opacity="0.8" />
        <path d="M-5 70 Q 25 60 45 74 Q 65 88 105 78 L 105 100 L -5 100 Z" fill={water} opacity="0.92" />
        <path d="M-5 70 Q 25 60 45 74 Q 65 88 105 78" fill="none" stroke={grey ? '#C7C7C7' : '#8FC0E6'} strokeWidth="0.6" />
        <rect x="30" y="14" width="22" height="20" rx="2" fill={block} />
        <rect x="56" y="12" width="18" height="16" rx="2" fill={block} />
        <rect x="8" y="40" width="20" height="20" rx="2" fill={block} />
        <rect x="34" y="40" width="26" height="18" rx="2" fill={block} />
        <rect x="64" y="36" width="22" height="16" rx="2" fill={block} />
        <g stroke={casing} fill="none" strokeLinecap="round">
          <path d="M-5 36 H 105" strokeWidth="7.5" />
          <path d="M30 -5 V 105" strokeWidth="7.5" />
          <path d="M-5 8 Q 40 30 105 20" strokeWidth="6" />
        </g>
        <g fill="none" strokeLinecap="round">
          <path d="M-5 36 H 105" stroke={roadMajor} strokeWidth="6" />
          <path d="M30 -5 V 105" stroke={roadMajor} strokeWidth="6" />
          <path d="M-5 8 Q 40 30 105 20" stroke={roadMinor} strokeWidth="4.5" />
        </g>
        <g stroke={roadMinor} fill="none" strokeWidth="2.6" strokeLinecap="round">
          <path d="M10 -5 V 36" /><path d="M58 0 V 105" /><path d="M82 -5 V 105" />
          <path d="M-5 58 H 60" /><path d="M30 78 H 105" /><path d="M0 20 H 30" />
        </g>
        <g stroke={roadMinor} fill="none" strokeWidth="1.6" strokeLinecap="round" opacity="0.9">
          <path d="M44 -5 V 36" /><path d="M70 36 V 78" /><path d="M30 50 H 82" />
        </g>
        {circle && (
          <g className={circle.tone === 'danger' ? 'flash-red' : ''}>
            <circle cx={circle.x} cy={circle.y} r={circle.r}
              fill={circle.tone === 'danger' ? 'rgba(211,47,47,0.15)' : 'rgba(46,125,50,0.15)'}
              stroke={circle.tone === 'danger' ? '#D32F2F' : '#2E7D32'} strokeWidth="0.7" strokeDasharray="2 1.5" />
          </g>
        )}
        {path && path.length > 1 && (
          <g>
            <polyline points={path.map(p => `${p.x},${p.y}`).join(' ')}
              fill="none" stroke="#1976D2" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" opacity="0.9" />
            <polyline points={path.map(p => `${p.x},${p.y}`).join(' ')}
              fill="none" stroke="#fff" strokeWidth="0.6" strokeLinejoin="round" strokeLinecap="round" strokeDasharray="0.5 2.5" />
          </g>
        )}
      </svg>
      {dim && <div style={{ position: 'absolute', inset: 0, background: 'rgba(120,124,120,0.32)' }} />}
      {markers.map((m, i) => (
        <div key={i} style={{ position: 'absolute', left: `${m.x}%`, top: `${m.y}%`, transform: 'translate(-50%,-100%)', zIndex: m.active ? 30 : 20 }}>
          <div className={m.active ? 'marker-drop' : ''} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
            {m.label && (
              <div style={{ marginBottom: 4, background: '#fff', borderRadius: 8, padding: '3px 9px',
                boxShadow: '0 2px 6px rgba(0,0,0,.18)', whiteSpace: 'nowrap',
                fontSize: 'calc(12px*var(--fz))', fontWeight: 700, color: m.stale ? 'var(--g500)' : 'var(--g900)' }}>
                {m.label}
              </div>
            )}
            <div style={{ position: 'relative' }}>
              {m.active && !m.stale && (
                <span className="ping-ring" style={{ position: 'absolute', inset: 0, margin: 'auto', width: 44, height: 44,
                  borderRadius: 999, background: m.color || 'var(--brand)', left: '50%', top: 20, transform: 'translateX(-50%)' }} />
              )}
              <div style={{ width: 44, height: 44, borderRadius: '50% 50% 50% 0', transform: 'rotate(45deg)',
                background: m.stale ? 'var(--g400)' : (m.color || 'var(--brand)'),
                boxShadow: '0 4px 10px rgba(0,0,0,.3)', display: 'flex', alignItems: 'center', justifyContent: 'center',
                border: '2.5px solid #fff', position: 'relative' }}>

              </div>

        <div style={{ position: 'absolute', right: 12, bottom: 16, display: 'flex', flexDirection: 'column',
          borderRadius: 10, overflow: 'hidden', boxShadow: '0 2px 8px rgba(0,0,0,.2)', zIndex: 40 }}>
          {['plus', 'minus'].map((k, i) => (
            <div key={k} style={{ width: 38, height: 38, background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
              borderBottom: i === 0 ? '1px solid var(--g200)' : 'none', color: 'var(--g700)', fontSize: 22, fontWeight: 600 }}>
              {i === 0 ? '+' : '−'}
            </div>
          ))}
        </div>
      )}
      {showControls && (
        <div style={{ position: 'absolute', left: 10, bottom: 12, background: 'rgba(255,255,255,.85)', borderRadius: 6,
          padding: '3px 8px', fontSize: 10, color: 'var(--g500)', fontWeight: 600, zIndex: 40 }}>지도</div>
      )}
    </div>
  );
}

function MapDot({ x, y, color, label }) {

const CHROME_C = { barBg: '#202124', tabBg: '#35363a', text: '#e8eaed', dim: '#9aa0a6', urlBg: '#282a2d' };

function ChromeTrafficLights() {
  return (
    <div style={{ display: 'flex', gap: 8, padding: '0 14px' }}>
      <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#ff5f57' }} />

      <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#28c840' }} />
    </div>
  );
}

function ChromeTab({ title = 'New Tab', active = false }) {
  const curve = (flip) => (
    <svg width="8" height="10" viewBox="0 0 8 10"
      style={{ position: 'absolute', bottom: 0, [flip ? 'right' : 'left']: -8, transform: flip ? 'scaleX(-1)' : 'none' }}>
      <path d="M0 10C2 9 6 8 8 0V10H0Z" fill={CHROME_C.tabBg}/>
    </svg>
  );
  return (
    <div style={{ position: 'relative', height: 34, alignSelf: 'flex-end', padding: '0 12px',
      display: 'flex', alignItems: 'center', gap: 8, background: active ? CHROME_C.tabBg : 'transparent',
      borderRadius: '8px 8px 0 0', minWidth: 120, maxWidth: 220, fontFamily: 'system-ui, sans-serif', fontSize: 12,
      color: active ? CHROME_C.text : CHROME_C.dim }}>
      {active && curve(false)}
      {active && curve(true)}
      <div style={{ width: 14, height: 14, borderRadius: '50%', background: '#5f6368', flexShrink: 0 }} />
      <span style={{ flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{title}</span>
    </div>
  );
}

function ChromeTabBar({ tabs = [{ title: 'New Tab' }], activeIndex = 0 }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', height: 44, background: CHROME_C.barBg, paddingRight: 8 }}>
      <ChromeTrafficLights />
      <div style={{ display: 'flex', alignItems: 'flex-end', height: '100%', paddingLeft: 4, flex: 1 }}>
        {tabs.map((t, i) => <ChromeTab key={i} title={t.title} active={i === activeIndex} />)}
      </div>
    </div>
  );
}

function ChromeToolbar({ url = 'example.com' }) {
  const iconDot = (
    <div style={{ width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ width: 16, height: 16, borderRadius: '50%', background: CHROME_C.dim, opacity: 0.4 }} />
    </div>
  );
  return (
    <div style={{ height: 40, background: CHROME_C.tabBg, display: 'flex', alignItems: 'center', gap: 4, padding: '0 8px' }}>
      {iconDot}
      <div style={{ flex: 1, height: 30, borderRadius: 15, background: CHROME_C.urlBg,
        display: 'flex', alignItems: 'center', gap: 8, padding: '0 14px', margin: '0 6px' }}>
        <div style={{ width: 12, height: 12, borderRadius: '50%', background: CHROME_C.dim, opacity: 0.4 }} />

function ChromeWindow({ tabs = [{ title: 'New Tab' }], activeIndex = 0, url = 'example.com', width = 900, height = 600, children }) {
  return (
    <div style={{ width, height, borderRadius: 10, overflow: 'hidden',

}

    '.dc-sectionhead{zoom:var(--dc-inv-zoom,1)}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

function dcFlatten(children) {
  const out = [];
  React.Children.forEach(children, (c) => {
    if (c && c.type === React.Fragment) out.push(...dcFlatten(c.props.children));
    else out.push(c);
  });
  return out;
}

const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      if (window.omelette) window.omelette.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  const registry = {};
  const sectionMeta = {};
  const sectionOrder = [];
  dcFlatten(children).forEach((sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id != null ? sec.props.id : sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const abs = [];
    dcFlatten(sec.props.children).forEach((ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id != null ? ab.props.id : ab.props.label;
      if (aid) abs.push([aid, ab]);
    });
    const srcKey = abs.map(([k]) => k).join('\x1f');
    const hidden = persisted.srcKey === srcKey ? (persisted.hidden || []) : [];
    const srcIds = [];
    abs.forEach(([aid, ab]) => {
      if (hidden.includes(aid)) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title != null ? persisted.title : sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });
  const tfKey = 'dc-viewport:' + location.pathname;
  const saveT = React.useRef(0);

  const lastPostedScale = React.useRef();
  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (!el) return;
    el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
    el.style.setProperty('--dc-inv-zoom', String(1 / scale));
    if (lastPostedScale.current !== scale) {
      lastPostedScale.current = scale;
      window.parent.postMessage({ type: '__dc_zoom', scale }, '*');
    }
    clearTimeout(saveT.current);
    saveT.current = setTimeout(() => {
      try { localStorage.setItem(tfKey, JSON.stringify(tf.current)); } catch (e) {}
    }, 200);
  }, [tfKey]);

  React.useLayoutEffect(() => {
    const flush = () => {
      clearTimeout(saveT.current);
      try { localStorage.setItem(tfKey, JSON.stringify(tf.current)); } catch (e) {}
    };
    try {
      const s = JSON.parse(localStorage.getItem(tfKey) || 'null');
      if (s && Number.isFinite(s.x) && Number.isFinite(s.y) && Number.isFinite(s.scale)) {
        tf.current = { x: s.x, y: s.y, scale: Math.min(maxScale, Math.max(minScale, s.scale)) };
        apply();
      }
    } catch (e) {}
    window.addEventListener('pagehide', flush);
    return () => { window.removeEventListener('pagehide', flush); flush(); };
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;
    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      let marker = null, markerY0 = 0;
      if (k !== 1) {
        const hit = document.elementFromPoint(cx, cy);
        marker = hit && hit.closest ? hit.closest('[data-dc-slot],[data-dc-section]') : null;
        if (marker) markerY0 = marker.getBoundingClientRect().top;
      }
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
      if (marker) {
        const drift = marker.getBoundingClientRect().top - (cy + (markerY0 - cy) * k);
        if (Math.abs(drift) > 0.1) { t.y -= drift; apply(); }
      }
    };
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 || (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);
    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return;
      if ((e.ctrlKey || e.metaKey) && !isMouseWheel(e)) {
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => { e.preventDefault(); zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale); };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };
    const onHostMsg = (e) => {
      const d = e.data;
      if (d && d.type === '__dc_set_zoom' && typeof d.scale === 'number') {
        const r = vp.getBoundingClientRect();
        zoomAt(r.left + r.width / 2, r.top + r.height / 2, d.scale / tf.current.scale);
      } else if (d && d.type === '__dc_probe') {
        window.parent.postMessage({ type: '__dc_present' }, '*');
        lastPostedScale.current = undefined;
        apply();
      }
    };
    window.addEventListener('message', onHostMsg);
    window.parent.postMessage({ type: '__dc_present' }, '*');
    lastPostedScale.current = undefined;
    apply();
    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      window.removeEventListener('message', onHostMsg);
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div ref={vpRef} className="design-canvas"
      style={{ height: '100vh', width: '100vw', background: DC.bg, overflow: 'hidden',
        overscrollBehavior: 'none', touchAction: 'none', position: 'relative',
        fontFamily: DC.font, boxSizing: 'border-box', ...style }}>
      <div ref={worldRef}
        style={{ position: 'absolute', top: 0, left: 0, transformOrigin: '0 0', willChange: 'transform',
          width: 'max-content', minWidth: '100%', minHeight: '100%', padding: '60px 0 80px' }}>
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id != null ? id : title;
  const all = React.Children.toArray(dcFlatten(children));
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const sec = (ctx && sid && ctx.section(sid)) || {};
  const allIds = artboards.map((a) => a.props.id != null ? a.props.id : a.props.label).filter(Boolean);
  const srcKey = allIds.join('\x1f');
  const hidden = sec.srcKey === srcKey ? (sec.hidden || []) : [];
  const srcOrder = allIds.filter((k) => !hidden.includes(k));
  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);
  const byId = Object.fromEntries(artboards.map((a) => [a.props.id != null ? a.props.id : a.props.label, a]));
  return (
    <div data-dc-section={sid} style={{ marginBottom: 'calc(80px * var(--dc-inv-zoom, 1))', position: 'relative' }}>
      <div style={{ padding: '0 60px' }}>
        <div className="dc-sectionhead" style={{ paddingBottom: 36 }}>
          <DCEditable tag="div" value={sec.title != null ? sec.title : title}
            onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
            style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
          {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
        </div>
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] != null ? (sec.labels || {})[k] : byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onDelete={() => ctx && ctx.patchSection(sid, (x) => ({
              hidden: [...(x.srcKey === srcKey ? (x.hidden || []) : []), k], srcKey }))}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus, onDelete }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId != null ? rawId : rawLabel;
  const ref = React.useRef(null);
  const cardRef = React.useRef(null);
  const menuRef = React.useRef(null);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [confirming, setConfirming] = React.useState(false);

  React.useEffect(() => {
    if (!menuOpen) { setConfirming(false); return; }
    const off = (e) => { if (!menuRef.current || !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('pointerdown', off, true);
    return () => document.removeEventListener('pointerdown', off, true);
  }, [menuOpen]);

  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');
    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };
    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };
    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-header" style={{ color: DC.label }} onPointerDown={(e) => e.stopPropagation()}>
        <div className="dc-labelrow">
          <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
            <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
          </div>
          <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
            <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
              style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
          </div>
        </div>
        <div className="dc-btns">
          <div ref={menuRef} style={{ position: 'relative' }}>
            <button className="dc-kebab" title="More" onClick={() => setMenuOpen((o) => !o)}>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><circle cx="2.5" cy="6" r="1.1"/><circle cx="6" cy="6" r="1.1"/><circle cx="9.5" cy="6" r="1.1"/></svg>
            </button>
            {menuOpen && (
              <div className="dc-menu" onPointerDown={(e) => e.stopPropagation()}>
                <button className="dc-danger"
                  onClick={() => { if (confirming) { setMenuOpen(false); onDelete(); } else setConfirming(true); }}>
                  {confirming ? 'Click again to delete' : 'Delete'}
                </button>
              </div>
            )}
          </div>
          <button className="dc-expand" onClick={onFocus} title="Focus">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
          </button>
        </div>
      </div>
      <div ref={cardRef} className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id != null ? artboard.props.id : artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);
  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const n = sectionOrder.length;
    for (let i = 1; i < n; i++) {
      const ns = sectionOrder[(((secIdx + d * i) % n) + n) % n];
      const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
      if (first) { ctx.setFocus(`${ns}/${first}`); return; }
    }
  };
  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });
  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));
  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}

function fmtPhone(v) {
  const d = v.replace(/\D/g, '').slice(0, 11);
  if (d.length < 4) return d;
  if (d.length < 8) return `${d.slice(0, 3)}-${d.slice(3)}`;
  return `${d.slice(0, 3)}-${d.slice(3, 7)}-${d.slice(7)}`;
}

function QrCode({ size = 132 }) {
  const n = 21, cell = size / n;
  const finder = (r, c) => (r < 7 && c < 7) || (r < 7 && c >= n - 7) || (r >= n - 7 && c < 7);
  const inFinder = (r, c) => {
    const blocks = [[0, 0], [0, n - 7], [n - 7, 0]];
    return blocks.some(([br, bc]) => {
      const rr = r - br, cc = c - bc;
      if (rr < 0 || rr > 6 || cc < 0 || cc > 6) return false;
      const edge = rr === 0 || rr === 6 || cc === 0 || cc === 6;
      const core = rr >= 2 && rr <= 4 && cc >= 2 && cc <= 4;
      return edge || core;
    });
  };
  const cells = [];
  for (let r = 0; r < n; r++) for (let c = 0; c < n; c++) {
    let on = false;
    if (finder(r, c)) on = inFinder(r, c);
    else on = ((r * 7 + c * 13 + r * c * 3) % 5) < 2;
    if (on) cells.push(<rect key={`${r}-${c}`} x={c * cell} y={r * cell} width={cell} height={cell} fill="#212121" />);
  }
  return <svg width={size} height={size} style={{ background: '#fff', borderRadius: 8 }}>{cells}</svg>;
}

function ParentMain({ preset }) {
  const { state, set, nav, toast } = useApp();
  const [sos, setSos] = useState(preset === 'sos-count' ? 'counting' : preset === 'sos-sent' ? 'sent' : 'idle');
  const [count, setCount] = useState(2);
  const sharing = state.locationSharing !== false && !state.consentRevoked;
  const timer = useRef(null);
  const startSos = () => { setCount(2); setSos('counting'); };
  const cancel = () => { clearTimeout(timer.current); setSos('idle'); };
  useEffect(() => {
    if (preset) return;
    if (sos !== 'counting') return;
    if (count <= 0) { setSos('sent'); return; }
    timer.current = setTimeout(() => setCount(c => c - 1), 1000);
    return () => clearTimeout(timer.current);
  }, [sos, count, preset]);
  useEffect(() => {
    if (preset) return;
    if (sos === 'sent') { const t = setTimeout(() => setSos('idle'), 3400); return () => clearTimeout(t); }
  }, [sos, preset]);
  return (
    <div style={{ height: '100%', background: 'var(--g50)', display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden' }}>
      <MobileHeader brand right={<IconBtn name="settings" onClick={() => nav('parent-settings', 'right')} />} />

          <div style={{ position: 'relative', width: 44, height: 44, flexShrink: 0 }}>
            {sharing && <span className="ping-ring" style={{ position: 'absolute', inset: 0, borderRadius: 999, background: 'var(--brand)' }} />}
            <div style={{ position: 'absolute', inset: 0, borderRadius: 999, background: sharing ? 'var(--brand)' : 'var(--g400)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="mapPin" size={24} color="#fff" stroke={2.2} />

            <div className="t-h2" style={{ color: 'var(--g900)' }}>{sharing ? '위치 전송 중' : '위치 공유 꺼짐'}</div>
            <div className="t-body-sm" style={{ color: 'var(--g500)', marginTop: 2 }}>{sharing ? '가족이 내 위치를 보고 있어요' : '가족이 내 위치를 볼 수 없어요'}</div>
          </div>
        </Card>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, minHeight: 280 }}>
          <button className="press animate-sos-pulse" onClick={startSos}
            style={{ width: 230, height: 230, borderRadius: 999, background: 'radial-gradient(circle at 38% 32%, #FF5A52, var(--danger))',
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8, color: '#fff' }}>
            <Icon name="sos" size={64} color="#fff" stroke={2.4} />
            <span style={{ fontSize: 'calc(34px*var(--fz))', fontWeight: 800, letterSpacing: '.04em' }}>SOS</span>

      </div>
      <div style={{ padding: '14px 20px calc(22px + 12px)', borderTop: '1px solid var(--g200)', background: '#fff', display: 'flex', alignItems: 'center', gap: 14 }}>
        <div style={{ flex: 1 }}>
          <div className="t-h3" style={{ color: 'var(--g900)' }}>실시간 위치 공유</div>
          <div className="t-body-sm" style={{ color: 'var(--g500)' }}>{sharing ? '켜짐 · 30초마다 전송' : '꺼짐'}</div>
        </div>
        <Toggle size="lg" on={sharing} onChange={v => {

        </div>
      )}
      {sos === 'sent' && (
        <div className="dim-in" style={{ position: 'absolute', inset: 0, zIndex: 500, background: 'rgba(20,18,18,.92)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 22, padding: 32 }}>

function renderRoute(route, preset) {
  switch (route) {
    case 'login': return <LoginScreen preset={preset} />;
    case 'onboarding': return <OnboardingScreen preset={preset} />;
    case 'group': return <GroupScreen preset={preset} />;
    case 'parent': return <ParentMain preset={preset} />;
    case 'parent-settings': return <ParentSettings preset={preset} />;
    case 'family': return <FamilyMap preset={preset} />;
    case 'family-history': return <FamilyHistory preset={preset} />;
    case 'family-chat': return <FamilyChat />;
    case 'family-geofence': return <FamilyGeofence preset={preset} />;
    case 'admin-groups': return <AdminApp initialTab="groups" preset={preset} />;
    case 'admin-sms': return <AdminApp initialTab="sms" preset={preset} />;
    case 'admin-stats': return <AdminApp initialTab="stats" />;
    default: return <ParentMain />;
  }
}

function ScreenHost({ initialRoute, initialState = {}, device = 'mobile', preset }) {
  const [route, setRoute] = useState(initialRoute);
  const [dir, setDir] = useState('right');
  const [state, setState] = useState({ role: 'parent', locationSharing: true, onboarded: true, onboardingStep: 1, ...initialState });
  const [toastObj, setToastObj] = useState(null);
  const nav = useCallback((to, d = 'right') => { setDir(d); setRoute(to); }, []);
  const set = useCallback(patch => setState(s => ({ ...s, ...patch })), []);
  const toast = useCallback((msg, tone = 'default') => {
    setToastObj({ msg, tone });
    clearTimeout(window['__t_' + initialRoute + preset]);
    window['__t_' + initialRoute + preset] = setTimeout(() => setToastObj(null), 2400);
  }, [initialRoute, preset]);
  const ctx = { route, nav, state, set, toast };
  const screen = renderRoute(route, route === initialRoute ? preset : undefined);
  if (device === 'admin') {
    return (
      <AppCtx.Provider value={ctx}>
        <ChromeWindow width={1180} height={760} url={`admin.ansimmap.kr/${route.replace('admin-', '')}`} tabs={[{ title: '안심맵 관리자 어드민' }]}>
          <div style={{ position: 'relative', height: '100%' }}>{screen}<Toast toast={toastObj} /></div>
        </ChromeWindow>
      </AppCtx.Provider>
    );
  }
  return (
    <AppCtx.Provider value={ctx}>
      <IOSDevice width={402} height={874}>
        <div key={route} className={dir === 'right' ? 'slide-in' : ''} style={{ height: '100%', position: 'relative' }}>{screen}</div>
        <Toast toast={toastObj} />
      </IOSDevice>
    </AppCtx.Provider>
  );
}

        <DCArtboard id="s-geo" label="⑨ SCR-009 · 안전 구역 설정" width={MW} height={MH}><Host initialRoute="family-geofence" /></DCArtboard>
        <DCArtboard id="s-geo-up" label="⑨b SCR-009 · Pro 플랜 업그레이드 안내" width={MW} height={MH}><Host initialRoute="family-geofence" preset="upsell" /></DCArtboard>
      </DCSection>

      <DCSection id="admin" title="백엔드 · 관리자 어드민 (PC 웹)" subtitle="회원·그룹 모니터링(+상세) → SMS/알림톡 발송(+확인) → 운영 지표 분석">
        <DCArtboard id="s-adm-g" label="⑩ SCR-010 · 회원 및 그룹 관리" width={AW} height={AH}><Host initialRoute="admin-groups" device="admin" /></DCArtboard>
        <DCArtboard id="s-adm-gd" label="⑩b SCR-010 · 그룹 상세 모달" width={AW} height={AH}><Host initialRoute="admin-groups" preset="detail" device="admin" /></DCArtboard>
        <DCArtboard id="s-adm-s" label="⑪ SCR-011 · SMS 발송" width={AW} height={AH}><Host initialRoute="admin-sms" device="admin" /></DCArtboard>
        <DCArtboard id="s-adm-sa" label="⑪b SCR-011 · 카카오 알림톡 채널" width={AW} height={AH}><Host initialRoute="admin-sms" preset="alimtalk" device="admin" /></DCArtboard>
        <DCArtboard id="s-adm-sc" label="⑪c SCR-011 · 발송 확인 모달" width={AW} height={AH}><Host initialRoute="admin-sms" preset="confirm" device="admin" /></DCArtboard>
        <DCArtboard id="s-adm-t" label="⑫ SCR-012 · 운영 통계 대시보드" width={AW} height={AH}><Host initialRoute="admin-stats" device="admin" /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Overview />);
